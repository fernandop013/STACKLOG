<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Stack/Log</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stack/Log">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<link rel="icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12161C; --surface:#1B212B; --surface2:#161B22; --border:#2A323D;
    --text:#E8EAED; --muted:#8B95A1; --muted2:#6B7480;
    --sup:#5FA8D3; --sup-dim:#274357;
    --ped:#D65F5F; --ped-dim:#4A2A2A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;
    min-height:100vh; -webkit-user-select:none; user-select:none;}
  input,textarea,select{-webkit-user-select:text;user-select:text;}
  button{cursor:pointer;font-family:inherit;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .app{padding-bottom:40px;min-height:100vh;}
  header{position:sticky;top:0;z-index:10;background:rgba(18,22,28,0.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border);padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top));
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:8px;font-weight:700;letter-spacing:1px;font-size:15px;}
  .brand .dim{color:var(--muted);}
  nav{display:flex;gap:6px;background:var(--surface);padding:4px;border-radius:10px;border:1px solid var(--border);}
  .navbtn{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--muted);
    padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;}
  .navbtn.active{background:var(--border);color:var(--text);}
  .drawer{position:fixed;top:0;left:0;bottom:0;width:250px;max-width:80vw;background:var(--surface2);
    border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px;
    padding-top:calc(16px + env(safe-area-inset-top));animation:slideIn 0.18s ease;}
  @keyframes slideIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .drawer-list{display:flex;flex-direction:column;gap:4px;flex:1;}
  .drawer-item{text-align:left;background:transparent;border:none;color:var(--muted);padding:12px 10px;
    border-radius:8px;font-family:inherit;font-size:15px;font-weight:500;}
  .drawer-item.active{background:var(--sup-dim);color:var(--sup);}
  .drawer-footer{border-top:1px solid var(--border);padding-top:10px;margin-top:10px;}
  .trackblock{margin-bottom:30px;}
  .trackblock h3{margin-bottom:10px;}
  .trackform{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .trackform input{flex:1;min-width:90px;}
  .tracklist{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
  .trackrow{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surface);
    border:1px solid var(--border);border-radius:8px;padding:9px 12px;}
  .trackval{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
  .permbanner{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--surface);
    border:1px solid var(--border);margin:12px 16px 0;padding:10px 14px;border-radius:10px;font-size:13px;
    color:var(--muted);flex-wrap:wrap;}
  .permbtn{background:var(--sup);color:#0A0D11;border:none;border-radius:8px;padding:6px 12px;font-weight:600;font-size:12px;}
  main{max-width:720px;margin:0 auto;padding:20px 16px;}
  .sectionhead{display:flex;align-items:baseline;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  h2{font-size:20px;font-weight:700;margin:0;}
  h3{font-size:16px;font-weight:600;margin:0;}
  .subtle{color:var(--muted);font-size:13px;font-family:'IBM Plex Mono',monospace;}
  .emptynote{color:var(--muted);font-size:14px;padding:20px 0;text-align:center;border:1px dashed var(--border);border-radius:12px;}
  .list{display:flex;flex-direction:column;gap:10px;}
  .card{display:flex;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:12px 14px;align-items:center;}
  .swipe-wrap{position:relative;border-radius:10px;overflow:hidden;}
  .swipe-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    background:var(--sup-dim);color:var(--sup);font-size:20px;font-weight:700;}
  .card.swipeable{position:relative;z-index:1;touch-action:pan-y;}
  .lockscreen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    min-height:100vh;padding:24px;text-align:center;}
  .lock-icon{font-size:40px;}
  .lock-input{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;
    padding:12px 16px;font-family:'IBM Plex Mono',monospace;font-size:20px;text-align:center;letter-spacing:6px;
    width:180px;}
  .stripe{width:4px;align-self:stretch;border-radius:2px;flex-shrink:0;}
  .card-body{flex:1;min-width:0;}
  .card-top{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:2px;}
  .cat-label{font-size:10px;font-weight:700;letter-spacing:0.8px;font-family:'IBM Plex Mono',monospace;}
  .sched-label{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;}
  .card-name{font-size:15px;font-weight:600;}
  .card-meta{font-size:13px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
  .card-notes{font-size:12px;color:var(--muted2);margin-top:4px;font-style:italic;}
  .checkbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:transparent;
    color:var(--text);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;}
  .checkbtn.done{background:var(--sup-dim);border-color:var(--sup);color:var(--sup);}
  .fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));right:24px;width:52px;height:52px;
    border-radius:50%;background:var(--sup);color:#0A0D11;border:none;display:flex;align-items:center;
    justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,0.4);font-size:22px;}
  .addbtn{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);
    color:var(--text);padding:8px 12px;border-radius:8px;font-size:13px;}
  .iconbtn{background:transparent;border:1px solid var(--border);color:var(--text);width:32px;height:32px;
    border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .iconbtn.small{width:28px;height:28px;color:var(--muted);}
  .calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .weekrow{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-family:'IBM Plex Mono',monospace;
    font-size:11px;color:var(--muted);text-align:center;margin-bottom:4px;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .daycell{min-height:52px;background:var(--surface);border:1px solid var(--border);border-radius:8px;
    color:var(--text);display:flex;flex-direction:column;align-items:center;padding:6px 2px;}
  .daycell.empty{background:transparent;border:none;min-height:52px;}
  .daycell.selected{border-color:var(--sup);}
  .daycell.today{background:#20293380;}
  .daynum{font-size:13px;font-family:'IBM Plex Mono',monospace;}
  .dotrow{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap;justify-content:center;}
  .dot{width:5px;height:5px;border-radius:50%;}
  .selectedpanel{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
  .emptystate{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px 20px;text-align:center;}
  .emptytext{color:var(--muted);font-size:14px;max-width:320px;margin:0;}
  .primarybtn{display:inline-flex;align-items:center;gap:6px;background:var(--sup);color:#0A0D11;border:none;
    padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;}
  .primarybtn:disabled{opacity:0.5;}
  .secondarybtn{background:transparent;color:var(--muted);border:1px solid var(--border);padding:10px 16px;
    border-radius:9px;font-size:13px;}
  .overlay{position:fixed;inset:0;background:rgba(6,8,11,0.7);display:flex;align-items:center;justify-content:center;
    padding:16px;z-index:50;}
  .modal{background:var(--surface2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:440px;
    max-height:88vh;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;
    -webkit-user-select:auto;user-select:auto;}
  .modalhead{display:flex;align-items:center;justify-content:space-between;}
  .modalfoot{display:flex;justify-content:flex-end;gap:8px;}
  .formgrid{display:flex;flex-direction:column;gap:12px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .fieldlabel{font-size:12px;color:var(--muted);font-weight:500;}
  input[type=text],input[type=number],input[type=date],select,textarea{
    background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;
    padding:9px 10px;font-family:'IBM Plex Mono',monospace;font-size:13px;width:100%;}
  textarea{min-height:60px;resize:vertical;}
  .segmented{display:flex;gap:6px;}
  .segbtn{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 10px;
    border-radius:8px;font-size:13px;}
  .segbtn.active-sup{background:var(--sup-dim);color:var(--sup);border-color:var(--sup);}
  .segbtn.active-ped{background:var(--ped-dim);color:var(--ped);border-color:var(--ped);}
  .weekpicker{display:flex;gap:6px;flex-wrap:wrap;}
  .timepick{width:auto !important;padding:0 12px;}
  .weekpick{width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px solid var(--border);
    color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:12px;}
  .weekpick.active{background:var(--sup-dim);border-color:var(--sup);color:var(--sup);}
  .ingredients-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
  .ingredient-row{display:flex;gap:6px;align-items:center;}
  .ingredient-row input[type=text]:nth-child(1){flex:2;min-width:0;}
  .ingredient-row input[type=text]:nth-child(2){flex:1;min-width:0;}
  .ingredient-row select{flex:0 0 64px;padding:9px 4px;}
  .ingredient-row .iconbtn.small{flex-shrink:0;color:var(--ped);}
  @media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important;}}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ---------- Lokaler Speicher (localStorage) ----------
const STORE_KEY = "stacklog:v1";
function loadState(){
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { items: [], log: {}, weightLog: [], bpLog: [] };
}
function saveState(state){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e) { console.error("Speichern fehlgeschlagen", e); }
}
let state = loadState();
state.weightLog = state.weightLog || [];
state.bpLog = state.bpLog || [];

// ---------- Konstanten ----------
const CATS = {
  supplement: { label: "Supplement", accent: "#5FA8D3", cls: "sup" },
  compound:   { label: "Compound",   accent: "#D65F5F", cls: "ped" },
};
const SCHEDULES = { daily: "Täglich", every_n: "Alle N Tage", weekly: "Bestimmte Wochentage", once: "Einzeltermin" };
const WEEKDAYS = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const TIMES = { morning:"Morgens", noon:"Mittags", evening:"Abends" };
const MONTHS = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

const uid = () => Math.random().toString(36).slice(2,10);
const fmt = (d) => { const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; };
const parseLocal = (s) => { const [y,m,d] = s.split("-").map(Number); return new Date(y,m-1,d); };
const todayStr = () => fmt(new Date());
const daysBetween = (a,b) => Math.round((b-a)/86400000);

function isDue(item, dateStr){
  const d = parseLocal(dateStr);
  const start = parseLocal(item.startDate);
  if (d < new Date(start.getFullYear(),start.getMonth(),start.getDate())) return false;
  switch(item.scheduleType){
    case "daily": return true;
    case "every_n": { const diff = daysBetween(start,d); const n = Math.max(1, parseInt(item.interval||"1",10)); return diff % n === 0; }
    case "weekly": return (item.weekdays||[]).includes(d.getDay());
    case "once": return item.startDate === dateStr;
    default: return false;
  }
}
function scheduleSummary(item){
  let base;
  if (item.scheduleType==="daily") base = "täglich";
  else if (item.scheduleType==="every_n") base = `alle ${item.interval||1} Tage`;
  else if (item.scheduleType==="weekly") base = (item.weekdays||[]).slice().sort().map(w=>WEEKDAYS[w]).join(", ") || "keine Tage gewählt";
  else if (item.scheduleType==="once") base = `einmalig am ${item.startDate}`;
  else base = "";
  const times = (item.timeOfDay||[]).map(t=>TIMES[t]).join("/");
  return times ? `${base} · ${times}` : base;
}
function dueOn(dateStr){ return state.items.filter(it => isDue(it, dateStr)); }

// ---------- App-Zustand ----------
let ui = { tab:"today", calY:new Date().getFullYear(), calM:new Date().getMonth(), selectedDay:todayStr(), modal:null, menuOpen:false };

function esc(s){ return (s||"").toString().replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function render(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <header>
      <div class="brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5FA8D3" stroke-width="2"><path d="M9 3h6M10 3v6l-5 9a2 2 0 001.7 3h10.6a2 2 0 001.7-3l-5-9V3"/></svg>
        <span>STACK<span class="dim">/LOG</span></span>
      </div>
      <button class="iconbtn" onclick="toggleMenu()" aria-label="Menü">☰</button>
    </header>
    <main id="main"></main>
    <div id="modalRoot"></div>
    <div id="settingsRoot"></div>
    <div id="menuRoot"></div>
  `;
  renderMain();
  renderModal();
  renderSettingsModal();
  renderMenu();
}

function setTab(t){ ui.tab = t; ui.menuOpen = false; render(); }
function toggleMenu(){ ui.menuOpen = true; renderMenu(); }
function closeMenu(){ ui.menuOpen = false; renderMenu(); }

function renderMenu(){
  const root = document.getElementById("menuRoot");
  if (!root) return;
  if (!ui.menuOpen){ root.innerHTML = ""; return; }
  const tabs = [
    { key:"today", label:"Heute" },
    { key:"calendar", label:"Kalender" },
    { key:"stack", label:"Plan" },
    { key:"tracker", label:"Tracker" },
  ];
  root.innerHTML = `
    <div class="overlay" onclick="closeMenu()">
      <div class="drawer" onclick="event.stopPropagation()">
        <div class="drawer-head">
          <span class="brand" style="font-size:14px;">STACK<span class="dim">/LOG</span></span>
          <button class="iconbtn" onclick="closeMenu()">✕</button>
        </div>
        <div class="drawer-list">
          ${tabs.map(t=>`<button class="drawer-item ${ui.tab===t.key?'active':''}" onclick="setTab('${t.key}')">${t.label}</button>`).join("")}
        </div>
        <div class="drawer-footer">
          <button class="drawer-item" onclick="closeMenu();openSettings();">⚙ Einstellungen</button>
        </div>
      </div>
    </div>
  `;
}

function renderMain(){
  const main = document.getElementById("main");
  if (ui.tab === "today") main.innerHTML = viewToday();
  else if (ui.tab === "calendar") main.innerHTML = viewCalendar();
  else if (ui.tab === "tracker") main.innerHTML = viewTracker();
  else main.innerHTML = viewStack();
}

function ingredientsSummary(item){
  if (item.ingredients && item.ingredients.length){
    return item.ingredients
      .filter(i => i.name && i.name.trim())
      .map(i => `${i.name}${i.amount ? ` ${i.amount}${i.unit||""}` : ""}`)
      .join(", ");
  }
  return item.substance || "";
}

function labelCard(item, dateStr, showCheck){
  const cat = CATS[item.category];
  const taken = dateStr ? !!state.log[`${item.id}:${dateStr}`] : false;
  const ingSummary = ingredientsSummary(item);
  const swipeAttrs = showCheck
    ? `ontouchstart="swipeStart(event)" ontouchmove="swipeMove(event)" ontouchend="swipeEnd(event,'${item.id}','${dateStr}')"`
    : "";
  const cardInner = `
    <div class="card ${showCheck?'swipeable':''}" ${swipeAttrs}>
      <div class="stripe" style="background:${cat.accent}"></div>
      <div class="card-body">
        <div class="card-top">
          <span class="cat-label" style="color:${cat.accent}">${cat.label.toUpperCase()}</span>
          <span class="sched-label">⏱ ${esc(scheduleSummary(item))}</span>
        </div>
        <div class="card-name">${esc(item.name)}</div>
        <div class="card-meta">${esc(item.amount)}${item.unit?` ${esc(item.unit)}`:""}${ingSummary?` · ${esc(ingSummary)}`:""}${item.syringeUnits?` · Spritze: ${esc(item.syringeUnits)}`:""}</div>
        ${item.notes?`<div class="card-notes">${esc(item.notes)}</div>`:""}
      </div>
      ${showCheck ? `<button class="checkbtn ${taken?'done':''}" onclick="toggleTaken('${item.id}','${dateStr}')">${taken?'✓':''}</button>`
                  : `<div style="display:flex;gap:8px;">
                       <button class="iconbtn small" onclick="openEdit('${item.id}')">✎</button>
                       <button class="iconbtn small" style="color:var(--ped)" onclick="deleteItem('${item.id}')">🗑</button>
                     </div>`}
    </div>
  `;
  if (!showCheck) return cardInner;
  return `
    <div class="swipe-wrap">
      <div class="swipe-hint">✓</div>
      ${cardInner}
    </div>
  `;
}

function adherenceStats(days){
  let due = 0, taken = 0;
  const today = new Date();
  for (let i=0; i<days; i++){
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate()-i);
    const ds = fmt(d);
    const dueItems = dueOn(ds);
    due += dueItems.length;
    taken += dueItems.filter(it => state.log[`${it.id}:${ds}`]).length;
  }
  return { due, taken, pct: due>0 ? Math.round(taken/due*100) : null };
}

function viewToday(){
  if (state.items.length === 0) return emptyState("Noch kein Plan angelegt. Leg dein erstes Supplement oder Compound an, um zu starten.");
  const date = todayStr();
  const due = dueOn(date);
  const niceDate = new Date().toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"});
  const stats = adherenceStats(7);
  return `
    <div class="sectionhead"><h2>Heute</h2><span class="subtle">${niceDate}</span></div>
    ${stats.due>0 ? `<div class="subtle" style="margin:-6px 0 4px;">Diese Woche: ${stats.taken}/${stats.due} genommen (${stats.pct}%)</div>` : ""}
    ${due.length===0 ? `<div class="emptynote">Für heute ist nichts fällig.</div>`
      : `<div class="list">${due.map(it=>labelCard(it,date,true)).join("")}</div>`}
    <button class="fab" onclick="openNew()">+</button>
  `;
}

function daysSince(iso){
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}

function backupStatusLine(){
  const last = localStorage.getItem("stacklog:lastBackup");
  const days = daysSince(last);
  let text, warn;
  if (days === null){ text = "Noch nie gesichert"; warn = true; }
  else if (days === 0){ text = "Letztes Backup: heute"; warn = false; }
  else if (days === 1){ text = "Letztes Backup: vor 1 Tag"; warn = false; }
  else { text = `Letztes Backup: vor ${days} Tagen`; warn = days >= 7; }
  return `<div class="subtle" style="${warn?'color:var(--ped);':''}">${text}${warn?' – Zeit für ein Backup':''}</div>`;
}

// ---------- Tracker: Gewicht & Blutdruck ----------
function nowLocalDatetimeValue(){
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// Referenzbereiche nach American Heart Association (AHA) – reine Orientierung, ersetzt keine ärztliche Einschätzung.
function bpCategory(sys, dia){
  if (sys >= 180 || dia >= 120) return { label:"Hypertensive Krise", color:"#B83232" };
  if (sys >= 140 || dia >= 90)  return { label:"Hoch (Stufe 2)",     color:"#D65F5F" };
  if (sys >= 130 || dia >= 80)  return { label:"Hoch (Stufe 1)",     color:"#D68F5F" };
  if (sys >= 120 && dia < 80)   return { label:"Erhöht",             color:"#D3C24F" };
  return { label:"Normal", color:"#4FB286" };
}

function buildSvgChart(datasets, opts){
  const width = 320, height = 160, padTop = 12, padBottom = 22, padLeft = 34, padRight = 10;
  const yMinOpt = opts && opts.yMin, yMaxOpt = opts && opts.yMax;
  const allPoints = datasets.flatMap(d => d.points);
  if (allPoints.length === 0) return `<div class="emptynote">Noch keine Daten.</div>`;
  const xs = allPoints.map(p => p.x.getTime());
  const ys = allPoints.map(p => p.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yLo = yMinOpt !== undefined ? yMinOpt : Math.floor(Math.min(...ys) - 1);
  const yHi = yMaxOpt !== undefined ? yMaxOpt : Math.ceil(Math.max(...ys) + 1);
  const xScale = x => padLeft + (xMax === xMin ? (width-padLeft-padRight)/2 : (x-xMin)/(xMax-xMin)*(width-padLeft-padRight));
  const yScale = y => height - padBottom - ((y - yLo) / ((yHi - yLo) || 1)) * (height - padTop - padBottom);

  let svg = `<svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}" style="display:block;">`;
  for (let i=0;i<=2;i++){
    const val = yLo + (yHi-yLo)*i/2;
    const y = yScale(val);
    svg += `<line x1="${padLeft}" y1="${y.toFixed(1)}" x2="${width-padRight}" y2="${y.toFixed(1)}" stroke="#2A323D" stroke-width="1"/>`;
    svg += `<text x="${padLeft-6}" y="${(y+3).toFixed(1)}" fill="#8B95A1" font-size="9" text-anchor="end">${Math.round(val)}</text>`;
  }
  datasets.forEach(ds => {
    const pts = ds.points.slice().sort((a,b)=>a.x-b.x);
    if (pts.length === 1){
      svg += `<circle cx="${xScale(pts[0].x.getTime()).toFixed(1)}" cy="${yScale(pts[0].y).toFixed(1)}" r="3.5" fill="${ds.color}"/>`;
    } else {
      const path = pts.map((p,i)=>`${i===0?'M':'L'}${xScale(p.x.getTime()).toFixed(1)},${yScale(p.y).toFixed(1)}`).join(" ");
      svg += `<path d="${path}" fill="none" stroke="${ds.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
      pts.forEach(p => { svg += `<circle cx="${xScale(p.x.getTime()).toFixed(1)}" cy="${yScale(p.y).toFixed(1)}" r="3" fill="${ds.color}"/>`; });
    }
  });
  const fmtShort = d => d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"});
  svg += `<text x="${padLeft}" y="${height-6}" fill="#8B95A1" font-size="9">${fmtShort(new Date(xMin))}</text>`;
  svg += `<text x="${width-padRight}" y="${height-6}" fill="#8B95A1" font-size="9" text-anchor="end">${fmtShort(new Date(xMax))}</text>`;
  svg += `</svg>`;
  return svg;
}

function addWeightEntry(){
  const date = document.getElementById("weightDateInput").value;
  const val = parseFloat(document.getElementById("weightValueInput").value.replace(",", "."));
  if (!date || isNaN(val)){ alert("Bitte Datum und Gewicht angeben."); return; }
  state.weightLog = state.weightLog || [];
  const idx = state.weightLog.findIndex(e => e.date === date);
  const entry = { id: idx>=0 ? state.weightLog[idx].id : uid(), date, value: val };
  if (idx>=0) state.weightLog[idx] = entry; else state.weightLog.push(entry);
  saveState(state);
  renderMain();
}
function deleteWeightEntry(id){
  state.weightLog = (state.weightLog||[]).filter(e => e.id !== id);
  saveState(state);
  renderMain();
}
function addBPEntry(){
  const dt = document.getElementById("bpDateTimeInput").value;
  const sys = parseInt(document.getElementById("bpSysInput").value, 10);
  const dia = parseInt(document.getElementById("bpDiaInput").value, 10);
  if (!dt || isNaN(sys) || isNaN(dia)){ alert("Bitte Datum/Uhrzeit sowie beide Werte angeben."); return; }
  state.bpLog = state.bpLog || [];
  state.bpLog.push({ id: uid(), datetime: dt, systolic: sys, diastolic: dia });
  saveState(state);
  renderMain();
}
function deleteBPEntry(id){
  state.bpLog = (state.bpLog||[]).filter(e => e.id !== id);
  saveState(state);
  renderMain();
}

function viewTracker(){
  const weightEntries = (state.weightLog||[]).slice().sort((a,b)=> a.date.localeCompare(b.date));
  const bpEntries = (state.bpLog||[]).slice().sort((a,b)=> a.datetime.localeCompare(b.datetime));
  const weightPoints = weightEntries.map(e => ({ x: parseLocal(e.date), y: e.value }));
  const bpSysPoints = bpEntries.map(e => ({ x: new Date(e.datetime), y: e.systolic }));
  const bpDiaPoints = bpEntries.map(e => ({ x: new Date(e.datetime), y: e.diastolic }));

  return `
    <div class="sectionhead"><h2>Tracker</h2></div>

    <div class="trackblock">
      <h3>Gewicht</h3>
      <div class="trackform">
        <input type="date" id="weightDateInput" value="${todayStr()}">
        <input type="text" inputmode="decimal" id="weightValueInput" placeholder="kg">
        <button class="addbtn" onclick="addWeightEntry()">+ Eintragen</button>
      </div>
      ${buildSvgChart([{ points: weightPoints, color:"#5FA8D3" }])}
      <div class="tracklist">
        ${weightEntries.slice().reverse().slice(0,10).map(e => `
          <div class="trackrow">
            <span class="subtle">${parseLocal(e.date).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"})}</span>
            <span class="trackval">${e.value} kg</span>
            <button class="iconbtn small" onclick="deleteWeightEntry('${e.id}')">🗑</button>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="trackblock">
      <h3>Blutdruck</h3>
      <div class="trackform">
        <input type="datetime-local" id="bpDateTimeInput" value="${nowLocalDatetimeValue()}">
        <input type="text" inputmode="numeric" id="bpSysInput" placeholder="Systolisch">
        <input type="text" inputmode="numeric" id="bpDiaInput" placeholder="Diastolisch">
        <button class="addbtn" onclick="addBPEntry()">+ Eintragen</button>
      </div>
      ${buildSvgChart([
        { points: bpSysPoints, color:"#D65F5F" },
        { points: bpDiaPoints, color:"#5FA8D3" }
      ], { yMin: 40, yMax: 200 })}
      <div class="subtle" style="margin:6px 0;"><span style="color:#D65F5F">●</span> Systolisch &nbsp; <span style="color:#5FA8D3">●</span> Diastolisch</div>
      <div class="tracklist">
        ${bpEntries.slice().reverse().slice(0,10).map(e => {
          const cat = bpCategory(e.systolic, e.diastolic);
          const dt = new Date(e.datetime);
          return `
            <div class="trackrow">
              <span class="subtle">${dt.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})} ${dt.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"})}</span>
              <span class="trackval" style="color:${cat.color}">${e.systolic}/${e.diastolic} <span style="font-weight:400;">(${cat.label})</span></span>
              <button class="iconbtn small" onclick="deleteBPEntry('${e.id}')">🗑</button>
            </div>
          `;
        }).join("")}
      </div>
      <div class="subtle" style="margin-top:8px;">Referenzbereiche nach American Heart Association – ersetzt keine ärztliche Einschätzung.</div>
    </div>
  `;
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = todayStr();
  a.href = url;
  a.download = `stacklog-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem("stacklog:lastBackup", new Date().toISOString());
  renderSettingsModal();
}

function importBackup(event){
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed || !Array.isArray(parsed.items)) throw new Error("Ungültiges Format");
      const proceed = confirm("Dein aktueller Plan wird durch das Backup ersetzt. Fortfahren?");
      if (!proceed) return;
      state = { items: parsed.items || [], log: parsed.log || {} };
      saveState(state);
      render();
    } catch (e) {
      alert("Diese Datei konnte nicht als Backup gelesen werden.");
    } finally {
      event.target.value = "";
    }
  };
  reader.readAsText(file);
}

function viewCalendar(){
  const y = ui.calY, m = ui.calM;
  const first = new Date(y,m,1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  let cells = "";
  for (let i=0;i<startWeekday;i++) cells += `<div class="daycell empty"></div>`;
  for (let d=1; d<=daysInMonth; d++){
    const dateStr = fmt(new Date(y,m,d));
    const due = dueOn(dateStr);
    const isToday = dateStr === todayStr();
    const isSelected = dateStr === ui.selectedDay;
    cells += `
      <button class="daycell ${isSelected?'selected':''} ${isToday?'today':''}" onclick="selectDay('${dateStr}')">
        <span class="daynum">${d}</span>
        <div class="dotrow">${due.slice(0,4).map(it=>`<span class="dot" style="background:${CATS[it.category].accent}"></span>`).join("")}</div>
      </button>`;
  }
  const dueSelected = dueOn(ui.selectedDay);
  const selNice = parseLocal(ui.selectedDay).toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long"});
  return `
    <div class="calhead">
      <button class="iconbtn" onclick="shiftMonth(-1)">‹</button>
      <h2>${MONTHS[m]} ${y}</h2>
      <button class="iconbtn" onclick="shiftMonth(1)">›</button>
    </div>
    <div class="weekrow">${WEEKDAYS.map(w=>`<div>${w}</div>`).join("")}</div>
    <div class="grid">${cells}</div>
    <div class="selectedpanel">
      <h3>${selNice}</h3>
      ${dueSelected.length===0 ? `<div class="emptynote">Nichts fällig an diesem Tag.</div>`
        : `<div class="list">${dueSelected.map(it=>labelCard(it,ui.selectedDay,true)).join("")}</div>`}
    </div>
  `;
}

function shiftMonth(delta){
  let nm = ui.calM + delta, ny = ui.calY;
  if (nm<0){ nm=11; ny-=1; } else if (nm>11){ nm=0; ny+=1; }
  ui.calM = nm; ui.calY = ny;
  renderMain();
}
function selectDay(d){ ui.selectedDay = d; renderMain(); }
function toggleTaken(itemId, dateStr){
  const key = `${itemId}:${dateStr}`;
  if (state.log[key]) delete state.log[key]; else state.log[key] = true;
  saveState(state);
  renderMain();
}

// ---------- Swipe-to-check ----------
let swipeState = { el:null, startX:0, dx:0 };
function swipeStart(e){
  swipeState.el = e.currentTarget;
  swipeState.startX = e.touches[0].clientX;
  swipeState.dx = 0;
  swipeState.el.style.transition = "none";
}
function swipeMove(e){
  if (!swipeState.el) return;
  const dx = e.touches[0].clientX - swipeState.startX;
  swipeState.dx = dx;
  const clamped = Math.max(-90, Math.min(90, dx));
  swipeState.el.style.transform = `translateX(${clamped}px)`;
}
function swipeEnd(e, itemId, dateStr){
  if (!swipeState.el) return;
  const el = swipeState.el;
  el.style.transition = "transform 0.2s ease";
  if (Math.abs(swipeState.dx) > 60){
    toggleTaken(itemId, dateStr);
  } else {
    el.style.transform = "translateX(0)";
  }
  swipeState = { el:null, startX:0, dx:0 };
}

  const has = f.weekdays.includes(idx);
  f.weekdays = has ? f.weekdays.filter(w=>w!==idx) : [...f.weekdays, idx];
  renderModal();
}
function toggleTimeOfDay(key){
  const f = ui.modal.form;
  const has = f.timeOfDay.includes(key);
  f.timeOfDay = has ? f.timeOfDay.filter(t=>t!==key) : [...f.timeOfDay, key];
  renderModal();
}
function saveForm(){
  const f = ui.modal.form;
  if (!f.name.trim() || !f.amount.toString().trim()) return;
  const idx = state.items.findIndex(i=>i.id===f.id);
  if (idx>=0) state.items[idx] = f; else state.items.push(f);
  saveState(state);
  ui.modal = null;
  render();
}

// ---------- App-Sperre (lokale PIN, kein echtes Verschlüsseln – nur Sichtschutz) ----------
const PIN_KEY = "stacklog:pin";
function getPin(){ return localStorage.getItem(PIN_KEY) || ""; }
function setPinValue(v){ if (v) localStorage.setItem(PIN_KEY, v); else localStorage.removeItem(PIN_KEY); }
function needsUnlock(){ return !!getPin() && sessionStorage.getItem("stacklog:unlocked") !== "true"; }

function renderLockScreen(){
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="lockscreen">
      <div class="lock-icon">🔒</div>
      <h2>Gesperrt</h2>
      <input type="password" inputmode="numeric" maxlength="6" id="unlockInput" class="lock-input" placeholder="PIN eingeben">
      <button class="primarybtn" onclick="tryUnlock()">Entsperren</button>
      <div id="lockError" class="subtle" style="color:var(--ped);min-height:18px;"></div>
    </div>
  `;
  const input = document.getElementById("unlockInput");
  input.focus();
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });
}
function tryUnlock(){
  const input = document.getElementById("unlockInput");
  if (input.value === getPin()){
    sessionStorage.setItem("stacklog:unlocked", "true");
    render();
  } else {
    document.getElementById("lockError").textContent = "Falsche PIN.";
    input.value = "";
    input.focus();
  }
}
function setNewPin(){
  const val = document.getElementById("newPinInput").value.trim();
  if (!/^\d{4,6}$/.test(val)){ alert("Bitte eine PIN aus 4–6 Ziffern eingeben."); return; }
  setPinValue(val);
  sessionStorage.setItem("stacklog:unlocked", "true");
  renderSettingsModal();
}
function changePin(){
  const current = prompt("Aktuelle PIN eingeben:");
  if (current === null) return;
  if (current !== getPin()){ alert("Falsche PIN."); return; }
  const next = prompt("Neue PIN (4–6 Ziffern):");
  if (next === null) return;
  if (!/^\d{4,6}$/.test(next)){ alert("Ungültige PIN."); return; }
  setPinValue(next);
  alert("PIN geändert.");
}
function removePin(){
  const current = prompt("Aktuelle PIN zum Entfernen eingeben:");
  if (current === null) return;
  if (current !== getPin()){ alert("Falsche PIN."); return; }
  setPinValue("");
  renderSettingsModal();
}
function settingsPinSection(){
  const pin = getPin();
  if (!pin){
    return `
      <div class="field">
        <span class="fieldlabel">App-Sperre</span>
        <div class="subtle" style="margin-bottom:6px;">Noch nicht aktiv – nur ein Sichtschutz, keine echte Verschlüsselung.</div>
        <div style="display:flex;gap:8px;">
          <input type="password" inputmode="numeric" maxlength="6" id="newPinInput" placeholder="Neue PIN (4–6 Ziffern)">
          <button class="addbtn" onclick="setNewPin()">Setzen</button>
        </div>
      </div>
    `;
  }
  return `
    <div class="field">
      <span class="fieldlabel">App-Sperre</span>
      <div class="subtle">Aktiv – PIN wird beim Öffnen der App abgefragt.</div>
      <div style="display:flex;gap:8px;margin-top:6px;">
        <button class="addbtn" onclick="changePin()">PIN ändern</button>
        <button class="addbtn" style="color:var(--ped)" onclick="removePin()">Entfernen</button>
      </div>
    </div>
  `;
}

if (needsUnlock()) renderLockScreen(); else render();
</script>
</body>
</html>
